name: A-Share Scanner
on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install akshare pandas requests
      - name: Run scanner
        env:
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: python scan.py
